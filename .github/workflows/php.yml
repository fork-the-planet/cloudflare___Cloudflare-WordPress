name: Test PHP Source

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

permissions:
  contents: read

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'

    - name: Validate composer.json and composer.lock
      run: composer validate --no-interaction

    - name: Install production dependencies
      run: composer install --prefer-dist --no-progress --no-dev

    - name: Remove unsupported PHP 8 symfony/polyfill return types
      run: composer run-script fix-polyfill-return-types

    - name: Upload production vendor
      uses: actions/upload-artifact@v4
      with:
        name: vendor-prod
        path: vendor/
        retention-days: 1

    - name: Install all dependencies (including dev)
      run: composer install --prefer-dist --no-progress

    - name: Upload full vendor
      uses: actions/upload-artifact@v4
      with:
        name: vendor-dev
        path: vendor/
        retention-days: 1

  syntax-check:
    name: Syntax Check (PHP ${{ matrix.php-versions }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-versions: ['7.4', '8.0', '8.1', '8.2', '8.3', '8.4']

    steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-versions }}

    - name: Download production vendor
      uses: actions/download-artifact@v4
      with:
        name: vendor-prod
        path: vendor/

    - name: PHP syntax check
      run: for f in $(find . -name '*.php'); do php -l $f; RETVAL=$?; if [ $RETVAL -ne 0 ]; then exit $RETVAL; fi; done

  test:
    name: Tests (PHP ${{ matrix.php-versions }}${{ matrix.extensions == 'intl' && ' + intl' || '' }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-versions: ['7.4', '8.0', '8.1', '8.2', '8.3', '8.4']
        extensions: ['intl', 'none']

    steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-versions }}
        extensions: ${{ matrix.extensions == 'none' && '-intl' || 'intl' }}

    - name: Download full vendor
      uses: actions/download-artifact@v4
      with:
        name: vendor-dev
        path: vendor/

    - name: Verify intl extension status
      run: |
        if [ "${{ matrix.extensions }}" = "intl" ]; then
          php -m | grep -q intl && echo "✓ intl extension is loaded" || (echo "✗ intl extension should be loaded" && exit 1)
        else
          php -m | grep -q intl && (echo "✗ intl extension should NOT be loaded" && exit 1) || echo "✓ intl extension is not loaded (testing polyfill)"
        fi

    - name: Run test suite
      run: composer run-script test