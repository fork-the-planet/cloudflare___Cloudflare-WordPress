name: PHP Composer

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build:

    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        experimental: [false]
        php-versions: ['7.4', '8.0', '8.1', '8.2', '8.3', '8.4']

    steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-versions }}

    - name: Cache Composer dependencies
      uses: actions/cache@v4
      with:
        path: /tmp/composer-cache
        key: ${{ runner.os }}-${{ matrix.php-versions }}-${{ hashFiles('**/composer.lock') }}

    - name: Validate composer.json and composer.lock
      run: composer validate --no-interaction

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress --no-dev

    - name: Remove unsupported PHP 8 symfony/polyfill return types
      uses: jacobtomlinson/gha-find-replace@v2
      with:
        find: ": string|false"
        replace: " "
        include: "**/symfony/polyfill-intl-{idn,normalizer}/bootstrap80.php"
        regex: false

    - name: PHP syntax check
      run: for f in $(find . -name '*.php'); do php -l $f; RETVAL=$?; if [ $RETVAL -ne 0 ]; then exit $RETVAL; fi; done

    - name: Install dependencies (second pass with dev)
      run: composer install --prefer-dist --no-progress --no-suggest --verbose

    - name: Remove intentional crash test in dependency
      run: composer run-script clean-crash-test

    # - name: Format
    #   run: composer run-script format

    - name: Run test suite
      run: composer run-script test